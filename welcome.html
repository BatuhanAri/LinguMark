<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguMark'a Hoş Geldiniz</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="./src/popup/style.css" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #0b0e14; color: white; }
    
    /* Aha Moment Animation */
    @keyframes select-text {
      0% { width: 0; background-color: transparent; }
      20% { width: 100%; background-color: rgba(6, 182, 212, 0.3); } /* cyan-500/30 */
      80% { width: 100%; background-color: rgba(6, 182, 212, 0.3); }
      100% { width: 0; background-color: transparent; }
    }
    
    @keyframes cursor-move {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; transform: translate(10px, 10px); }
      20% { transform: translate(80px, 10px); }
      30% { transform: translate(80px, 20px); } /* Right click */
      40% { transform: translate(100px, 40px); } /* Move to menu */
      50% { transform: translate(100px, 40px) scale(0.9); } /* Click menu */
      60% { transform: translate(100px, 40px) scale(1); opacity: 0; }
      100% { opacity: 0; transform: translate(0,0); }
    }
    
    @keyframes context-menu {
      0%, 29% { opacity: 0; transform: scale(0.9); }
      30%, 55% { opacity: 1; transform: scale(1); }
      56%, 100% { opacity: 0; transform: scale(0.9); }
    }
    
    @keyframes card-pop {
      0%, 60% { opacity: 0; transform: translateY(20px) scale(0.9); }
      65%, 90% { opacity: 1; transform: translateY(0) scale(1); }
      95%, 100% { opacity: 0; transform: translateY(-20px) scale(1.05); }
    }

    .demo-selection { animation: select-text 6s ease-in-out infinite; }
    .demo-cursor { animation: cursor-move 6s ease-in-out infinite; }
    .demo-menu { animation: context-menu 6s ease-in-out infinite; }
    .demo-card { animation: card-pop 6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
  
  <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-5xl flex flex-col lg:flex-row items-center gap-16 z-10">
    
    <!-- Left Text Content -->
    <div class="flex-1 text-left">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-6">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
        <span class="text-sm font-bold text-slate-300">Kurulum Başarılı</span>
      </div>
      <h1 class="text-6xl font-black tracking-tighter mb-6 leading-tight">İnternetteki her kelime <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">artık senin kütüphanen.</span></h1>
      <p class="text-xl text-slate-400 font-medium leading-relaxed mb-10">Makale okurken, haber izlerken veya araştırma yaparken bilmediğin bir kelime mi gördün? Sadece seç, sağ tıkla ve LinguMark'a ekle.</p>
      
      <div class="flex items-center gap-4">
        <button id="startBtn" class="px-8 py-4 rounded-xl font-black text-[#0b0e14] bg-cyan-400 hover:bg-cyan-300 transition-all shadow-[0_0_20px_rgba(6,182,212,0.3)]">
          Dashboard'u Aç ve Başla
        </button>
      </div>
    </div>

    <!-- Right Demo Animation (Aha Moment) -->
    <div class="flex-1 w-full relative">
      <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl relative h-[400px] flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Fake Article -->
        <div class="w-full max-w-sm mb-auto mt-8">
          <div class="w-1/3 h-4 bg-slate-700/50 rounded mb-4"></div>
          <div class="w-full h-3 bg-slate-700/30 rounded mb-3"></div>
          <div class="w-5/6 h-3 bg-slate-700/30 rounded mb-3 flex relative">
            <div class="w-20 h-3 absolute left-10">
              <!-- The selected text -->
              <span class="absolute inset-0 demo-selection block rounded-sm"></span>
              <span class="relative z-10 text-[11px] font-mono text-slate-200 leading-[12px] tracking-widest pl-1">ephemeral</span>
            </div>
          </div>
          <div class="w-4/6 h-3 bg-slate-700/30 rounded"></div>
        </div>

        <!-- Fake Context Menu -->
        <div class="demo-menu absolute left-[40%] top-[35%] w-48 bg-slate-800 border border-slate-700 rounded-lg shadow-xl overflow-hidden z-20">
          <div class="px-3 py-2 text-xs text-slate-400 border-b border-slate-700">Kopyala</div>
          <div class="px-3 py-2 text-xs text-slate-400 border-b border-slate-700">Araştır</div>
          <div class="px-3 py-2.5 text-xs text-white font-bold bg-cyan-500/20 border-l-2 border-cyan-400 flex items-center justify-between">
            LinguMark'a Ekle
            <img src="icons/logo.png" class="w-3 h-3">
          </div>
        </div>

        <!-- Fake Cursor -->
        <div class="demo-cursor absolute left-[30%] top-[30%] z-30">
          <svg class="w-6 h-6 text-white drop-shadow-md" fill="currentColor" stroke="black" stroke-width="1" viewBox="0 0 24 24"><path d="M4 2v20l5.5-5.5H16L4 2z"/></svg>
        </div>

        <!-- The Resulting Card -->
        <div class="demo-card absolute bottom-10 w-64 bg-slate-900 border border-cyan-500/30 rounded-2xl p-4 shadow-2xl z-10 flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          </div>
          <div>
            <h4 class="text-white font-bold text-sm mb-1">ephemeral</h4>
            <p class="text-cyan-300 text-xs">geçici, kısa ömürlü</p>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script type="module">
    document.getElementById('startBtn').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('dashboard.html') });
    });
  </script>
</body>
</html>
