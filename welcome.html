<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguMark'a Hoş Geldiniz</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="./src/popup/style.css" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background-color: #0b0e14; color: white; }
    
    /* Aha Moment Animation */
    @keyframes select-text {
      0% { width: 0; background-color: transparent; }
      20% { width: 100%; background-color: rgba(6, 182, 212, 0.3); } /* cyan-500/30 */
      80% { width: 100%; background-color: rgba(6, 182, 212, 0.3); }
      100% { width: 0; background-color: transparent; }
    }
    
    @keyframes cursor-move {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 1; transform: translate(10px, 10px); }
      20% { transform: translate(80px, 10px); }
      30% { transform: translate(80px, 20px); } /* Right click */
      40% { transform: translate(100px, 40px); } /* Move to menu */
      50% { transform: translate(100px, 40px) scale(0.9); } /* Click menu */
      60% { transform: translate(100px, 40px) scale(1); opacity: 0; }
      100% { opacity: 0; transform: translate(0,0); }
    }
    
    @keyframes context-menu {
      0%, 29% { opacity: 0; transform: scale(0.9); }
      30%, 55% { opacity: 1; transform: scale(1); }
      56%, 100% { opacity: 0; transform: scale(0.9); }
    }
    
    @keyframes card-pop {
      0%, 60% { opacity: 0; transform: translateY(20px) scale(0.9); }
      65%, 90% { opacity: 1; transform: translateY(0) scale(1); }
      95%, 100% { opacity: 0; transform: translateY(-20px) scale(1.05); }
    }

    .demo-selection { animation: select-text 6s ease-in-out infinite; }
    .demo-cursor { animation: cursor-move 6s ease-in-out infinite; }
    .demo-menu { animation: context-menu 6s ease-in-out infinite; }
    .demo-card { animation: card-pop 6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
  
  <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-6xl flex flex-col lg:flex-row items-center gap-24 z-10 px-8 py-12">
    
    <!-- Left Text Content -->
    <div class="flex-1 text-left">
      <div class="inline-flex items-center gap-3 px-5 py-2.5 rounded-full bg-white/5 border border-white/10 mb-8 shadow-lg">
        <span class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></span>
        <span class="text-sm font-bold text-slate-300 tracking-wide">Kurulum Başarılı</span>
      </div>
      <h1 class="text-7xl font-black tracking-tighter mb-8 leading-[1.1]">İnternetteki her kelime <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">artık senin kütüphanen.</span></h1>
      <p class="text-2xl text-slate-400 font-medium leading-relaxed mb-12">Makale okurken, haber izlerken veya araştırma yaparken bilmediğin bir kelime mi gördün? Sadece seç, sağ tıkla ve LinguMark'a ekle.</p>
      
      <div class="flex items-center gap-6">
        <button id="startBtn" class="px-10 py-5 rounded-2xl font-black text-lg text-[#0b0e14] bg-cyan-400 hover:bg-cyan-300 transition-all shadow-[0_0_30px_rgba(6,182,212,0.4)] hover:shadow-[0_0_40px_rgba(6,182,212,0.6)] transform hover:-translate-y-1">
          Dashboard'u Aç ve Başla
        </button>
      </div>
    </div>

    <!-- Right Demo Animation (Aha Moment) -->
    <div class="flex-1 w-full relative max-w-lg">
      <div class="bg-white/[0.03] backdrop-blur-2xl border border-white/10 rounded-[2rem] p-8 shadow-2xl relative h-[450px] flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Fake Article -->
        <div class="w-full max-w-sm mb-auto mt-10 space-y-4">
          <div class="w-2/3 h-5 bg-slate-700/50 rounded-md"></div>
          <div class="w-full h-4 bg-slate-700/30 rounded-md"></div>
          <div class="w-11/12 h-4 bg-slate-700/30 rounded-md flex relative">
            <div class="w-24 h-4 absolute left-12">
              <!-- The selected text -->
              <span class="absolute inset-0 demo-selection block rounded-sm"></span>
              <span class="relative z-10 text-[13px] font-mono text-slate-200 leading-[16px] tracking-widest pl-1.5">ephemeral</span>
            </div>
          </div>
          <div class="w-5/6 h-4 bg-slate-700/30 rounded-md"></div>
        </div>

        <!-- Fake Context Menu -->
        <div class="demo-menu absolute left-[45%] top-[30%] w-56 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl overflow-hidden z-20">
          <div class="px-4 py-3 text-sm text-slate-400 border-b border-slate-700/50">Kopyala</div>
          <div class="px-4 py-3 text-sm text-slate-400 border-b border-slate-700/50">Araştır</div>
          <div class="px-4 py-3.5 text-sm text-white font-bold bg-cyan-500/20 border-l-4 border-cyan-400 flex items-center justify-between">
            LinguMark'a Ekle
            <img src="icons/logo.png" class="w-4 h-4">
          </div>
        </div>

        <!-- Fake Cursor -->
        <div class="demo-cursor absolute left-[35%] top-[25%] z-30">
          <svg class="w-8 h-8 text-white drop-shadow-lg" fill="currentColor" stroke="black" stroke-width="1" viewBox="0 0 24 24"><path d="M4 2v20l5.5-5.5H16L4 2z"/></svg>
        </div>

        <!-- The Resulting Card -->
        <div class="demo-card absolute bottom-12 w-72 bg-slate-900 border border-cyan-500/30 rounded-2xl p-5 shadow-2xl z-10 flex items-center gap-5">
          <div class="w-12 h-12 rounded-full bg-cyan-500/20 flex items-center justify-center shrink-0">
            <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          </div>
          <div>
            <h4 class="text-white font-bold text-base mb-1.5">ephemeral</h4>
            <p class="text-cyan-300 text-sm">geçici, kısa ömürlü</p>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script type="module">
    document.getElementById('startBtn').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('dashboard.html') });
    });
  </script>
</body>
</html>
