<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguMark</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="./src/popup/style.css" rel="stylesheet">
</head>
<body class="bg-[#0b0e14] text-slate-200 w-[360px] relative overflow-hidden font-['Outfit']">
  
  <!-- Premium Animated Background -->
  <div class="fixed -top-20 -left-20 w-64 h-64 bg-purple-600 rounded-full mix-blend-screen filter blur-[80px] opacity-40 animate-slow-pulse pointer-events-none"></div>
  <div class="fixed top-[40%] -right-24 w-72 h-72 bg-cyan-600 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-slow-pulse pointer-events-none" style="animation-delay: -2s;"></div>
  <div class="fixed -bottom-24 left-10 w-64 h-64 bg-pink-600 rounded-full mix-blend-screen filter blur-[90px] opacity-20 animate-slow-pulse pointer-events-none" style="animation-delay: -1s;"></div>

  <div id="app" class="p-6 flex flex-col relative z-10 box-border">
    
    <!-- Header -->
    <header class="flex justify-between items-center mb-6 shrink-0">
      <div class="flex items-center gap-3.5">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-tr from-purple-500 to-cyan-400 p-[2px] shadow-2xl shadow-purple-500/30">
          <div class="w-full h-full bg-[#0b0e14] rounded-[14px] flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-tr from-purple-500/20 to-cyan-400/20"></div>
            <span class="text-2xl font-black bg-gradient-to-tr from-purple-400 to-cyan-300 bg-clip-text text-transparent relative z-10 block">L</span>
          </div>
        </div>
        <div>
          <h1 id="appTitle" class="text-xl font-extrabold tracking-tight text-white drop-shadow-md leading-none mb-1">
            LinguMark
          </h1>
          <p id="appSubTitle" class="text-[10px] text-cyan-400 font-bold tracking-[0.1em] uppercase opacity-90 leading-none">Smart Translation</p>
        </div>
      </div>
      
      <!-- We moved Master Switch down as a huge button -->
    </header>

    <!-- Master Switch (Huge Toggle) -->
    <label class="flex items-center justify-between w-full p-4 bg-white/5 backdrop-blur-md rounded-2xl cursor-pointer hover:bg-white/10 transition-colors border border-white/10 mb-5 shrink-0 group shadow-lg">
      <span class="font-black text-white text-md tracking-wide flex items-center gap-3">
        <span class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse" id="statusDot"></span>
        Eklentiyi Aktifleştir
      </span>
      <div class="relative flex items-center">
        <input type="checkbox" id="masterSwitch" class="sr-only">
        <div class="block bg-slate-800 w-14 h-8 rounded-full transition-all duration-300 border border-white/10 group-hover:border-white/20 shadow-inner" id="switchBg"></div>
        <div class="dot absolute left-1 top-1 bg-gradient-to-tr from-slate-200 to-white w-6 h-6 rounded-full transition-transform duration-300 shadow-xl" id="switchDot"></div>
      </div>
    </label>

    <!-- Action Button -->
    <div class="mb-5 shrink-0">
      <button id="practiceBtn" class="w-full bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 text-white font-bold py-3 px-4 rounded-2xl shadow-[0_10px_20px_-5px_rgba(168,85,247,0.4)] transform transition-all duration-300 hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center gap-3 group border border-white/10 overflow-hidden relative">
        <div class="absolute inset-0 bg-gradient-to-r from-white/0 via-white/10 to-white/0 -translate-x-full group-hover:animate-shimmer"></div>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:rotate-12 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span id="practiceBtnText" class="tracking-wide text-sm">Kelime Pratiği Yap</span>
      </button>
    </div>

    <!-- Controls Box (Glassmorphic) -->
    <div class="bg-white/5 backdrop-blur-2xl rounded-2xl p-3 border border-white/10 flex justify-between items-center mb-5 shrink-0 relative overflow-visible shadow-2xl z-[100]">
      <div class="flex items-center gap-2.5 pl-2 relative z-10 pointer-events-none">
        <div class="p-1.5 bg-purple-500/10 rounded-lg border border-purple-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
        </div>
        <span id="translateToLabel" class="text-[9px] font-black text-slate-400 uppercase tracking-[0.15em]">TARGET LANG</span>
      </div>
      
      <div class="relative">
        <button id="langDropdownBtn" class="bg-black/30 border border-white/10 text-white text-[11px] rounded-xl focus:ring-2 focus:ring-purple-400/50 flex items-center justify-between gap-2.5 pl-3.5 pr-2.5 py-2 focus:outline-none transition-all cursor-pointer font-bold hover:bg-black/50 backdrop-blur-md shadow-2xl min-w-[110px]">
          <span id="langDropdownText">Turkish</span>
          <svg class="h-3.5 w-3.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
        </button>

        <!-- Dropdown Options -->
        <div id="langDropdownMenu" class="absolute hidden top-full mt-2 right-0 w-32 bg-[#0b0e14]/95 backdrop-blur-3xl border border-white/10 rounded-2xl shadow-[0_20px_40px_-10px_rgba(0,0,0,0.5)] overflow-hidden py-1.5 z-[200] transform origin-top-right transition-all">
          <button class="lang-option w-full text-left px-4 py-2 text-[11px] font-medium text-slate-300 hover:text-white hover:bg-purple-500/20 transition-all flex items-center justify-between" data-value="tr">Turkish</button>
          <button class="lang-option w-full text-left px-4 py-2 text-[11px] font-medium text-slate-300 hover:text-white hover:bg-purple-500/20 transition-all flex items-center justify-between" data-value="es">Spanish</button>
          <button class="lang-option w-full text-left px-4 py-2 text-[11px] font-medium text-slate-300 hover:text-white hover:bg-purple-500/20 transition-all flex items-center justify-between" data-value="fr">French</button>
          <button class="lang-option w-full text-left px-4 py-2 text-[11px] font-medium text-slate-300 hover:text-white hover:bg-purple-500/20 transition-all flex items-center justify-between" data-value="de">German</button>
          <button class="lang-option w-full text-left px-4 py-2 text-[11px] font-medium text-slate-300 hover:text-white hover:bg-purple-500/20 transition-all flex items-center justify-between" data-value="it">Italian</button>
        </div>
      </div>
    </div>

  </div>
  
  <script type="module" src="./src/popup/main.js"></script>
</body>
</html>
