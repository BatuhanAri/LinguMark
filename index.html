<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguMark</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="./src/popup/style.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-[#f8f9fc] text-slate-800 w-[350px] min-h-[450px] max-h-[500px] overflow-hidden">
  
  <!-- Sleek gradient header background -->
  <div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-b-[2rem] shadow-lg -z-10"></div>

  <div id="app" class="p-5 flex flex-col h-[450px]">
    
    <header class="flex justify-between items-start mb-6 shrink-0 text-white">
      <div>
        <h1 class="text-2xl font-bold tracking-tight flex items-center gap-2 drop-shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-blue-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          LinguMark
        </h1>
        <p class="text-[11px] text-blue-200 mt-1 font-medium ml-8">Contextual translation</p>
      </div>
      
      <label class="flex items-center cursor-pointer group mt-1">
        <div class="relative">
          <input type="checkbox" id="masterSwitch" class="sr-only">
          <div class="block bg-white/20 w-11 h-6 rounded-full transition-all duration-300 border border-white/30 group-hover:bg-white/30" id="switchBg"></div>
          <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 shadow-sm" id="switchDot"></div>
        </div>
      </label>
    </header>

    <!-- Controls Box -->
    <div class="bg-white/90 backdrop-blur-md rounded-2xl p-3 shadow-sm border border-white/40 flex justify-between items-center mb-5 z-10 relative">
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider ml-1">Target Language</span>
      <select id="targetLang" class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-1.5 focus:outline-none transition-colors cursor-pointer font-medium">
        <option value="tr">Turkish</option>
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
      </select>
    </div>

    <!-- Word List Area -->
    <main class="flex-grow overflow-y-auto no-scrollbar relative z-10 bg-transparent rounded-xl">
      <ul id="wordList" class="space-y-3 pb-2 pt-1 px-1">
        <!-- Render words dynamically here -->
      </ul>

      <div id="emptyState" class="hidden flex-col items-center justify-center text-center py-12 opacity-80 h-full">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-4 border border-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-blue-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        </div>
        <p class="text-sm font-semibold text-slate-700 mb-1">No words saved yet!</p>
        <p class="text-xs text-slate-400 px-6 leading-relaxed">Select text on any site, right-click, and click <strong class="text-slate-500">Add to LinguMark</strong> to save and translate.</p>
      </div>
    </main>
  </div>
  <script type="module" src="./src/popup/main.js"></script>
</body>
</html>
